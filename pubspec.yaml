name: codemod
version: 1.3.0
homepage: https://github.com/Workiva/dart_codemod

description: >
  Write and run automated code modifications on a codebase. Primarily geared
  towards updating and refactoring Dart code, but can modify any files.

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  analyzer: ^7.0.0
  args: ^2.7.0
  glob: ^2.1.2
  io: ^1.0.4
  logging: ^1.2.0
  path: ^1.9.0
  quiver: ^3.2.1
  source_span: ^1.10.0
  stack_trace: ^1.11.1
  test: ^1.25.2
  test_descriptor: ^2.0.1

dev_dependencies:
  build_runner: ^2.4.13
  dart_style: ^3.1.4
  dependency_validator: ^3.2.2
  lints: ^6.0.0
  meta: ^1.15.0
  mocktail: ^1.0.3
